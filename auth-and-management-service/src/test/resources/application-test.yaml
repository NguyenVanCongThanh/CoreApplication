spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  # Disable mail auto-config (use mock in tests)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

jwt:
  secret: "test-secret-key-minimum-32-characters!!"
  expirationMs: 3600000
  refreshExpirationMs: 86400000

cors:
  allowed-origins:
    - http://localhost:3000

app:
  name: TestApp
  url: http://localhost:3000
  upload:
    dir: /tmp/test-uploads/
  admin:
    email: admin@test.com
    password: AdminPass1

lms:
  api:
    url: http://localhost:9999/lms
    secret: test-lms-secret

logging:
  level:
    root: WARN
    com.example: DEBUG
    org.springframework.security: WARN
