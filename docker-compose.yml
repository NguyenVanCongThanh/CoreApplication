version: '3.8'

x-common-healthcheck: &common-healthcheck
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 30s

x-common-logging: &common-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Frontend: Next.js Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-unknown}
        - VERSION=${VERSION:-1.0.0}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_LMS_API_URL=${NEXT_PUBLIC_LMS_API_URL}
    image: ${DOCKER_USERNAME}/bdc-frontend:${IMAGE_TAG:-latest}
    container_name: nextjs-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      BACKEND_URL: http://backend:8080
      LMS_API_URL: http://lms-backend:8081
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_LMS_API_URL: ${NEXT_PUBLIC_LMS_API_URL}
      GOOGLE_SCRIPT_URL: ${GOOGLE_SCRIPT_URL}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI}
      NEXT_PUBLIC_YOUTUBE_UPLOAD_ENABLED: ${NEXT_PUBLIC_YOUTUBE_UPLOAD_ENABLED}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_TELEMETRY_DISABLED: 1

    ports:
      - "${FRONTEND_PORT:-3000}:3000"

    volumes:
      - ./frontend/logs:/app/logs
      - ./frontend/data:/app/data

    depends_on:
      backend:
        condition: service_healthy
      lms-backend:
        condition: service_healthy

    networks:
      - app-network

    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      start_period: 45s

    logging: *common-logging

    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    security_opt:
      - no-new-privileges:true

    labels:
      - "service.type=frontend"
      - "service.name=nextjs-prod"
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`bdc.hpcc.vn`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # Database: PostgreSQL 
  postgres:
    image: postgres:15-alpine
    container_name: postgres-auth
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_SHARED_BUFFERS: "128MB"

    ports:
      - "${POSTGRES_PORT:-5433}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./auth-and-management-service/init-scripts:/docker-entrypoint-initdb.d:ro

    networks:
      - app-network

    healthcheck:
      <<: *common-healthcheck
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]

    logging: *common-logging

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    security_opt:
      - no-new-privileges:true

    labels:
      - "service.type=database"
      - "service.name=postgres-auth"

  # auth-and-management-service: Spring Boot
  backend:
    build:
      context: ./auth-and-management-service
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-unknown}
        - VERSION=${VERSION:-1.0.0}
    image: ${DOCKER_USERNAME}/bdc-backend:${IMAGE_TAG:-latest}
    container_name: auth-service
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      LMS_API_URL: ${LMS_API_URL}
      LMS_API_SECRET: ${LMS_API_SECRET}

      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-20}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${HIKARI_MIN_IDLE:-5}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 20000
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 300000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 1200000
      SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME: 300000

      SPRING_JPA_HIBERNATE_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: false
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: false
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: 50
      SPRING_JPA_PROPERTIES_HIBERNATE_ORDER_INSERTS: true
      SPRING_JPA_PROPERTIES_HIBERNATE_ORDER_UPDATES: true
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_FETCH_SIZE: 50

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}

      CORS_ALLOWED_ORIGINS: http://frontend:3000,https://bdc.hpcc.vn,http://localhost:3000

      LOGGING_LEVEL_ROOT: ${LOG_LEVEL:-INFO}
      LOGGING_LEVEL_COM_EXAMPLE: ${LOG_LEVEL:-INFO}
      LOGGING_PATTERN_CONSOLE: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: true
      MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: true

      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+ParallelRefProcEnabled
        -Djava.security.egd=file:/dev/./urandom

      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL: ${EMAIL}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}

    ports:
      - "${BACKEND_PORT:-8080}:8080"

    volumes:
      - upload_data:/app/uploads
      - ./auth-and-management-service/logs:/app/logs

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app-network

    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health/liveness"]
      start_period: 60s

    logging: *common-logging

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M

    security_opt:
      - no-new-privileges:true

    labels:
      - "service.type=backend"
      - "service.name=auth-service"
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`bdc.hpcc.vn`) && PathPrefix(`/apiv1`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  # Database: PostgreSQL (LMS Service)
  postgres-lms:
    image: pgvector/pgvector:pg15
    container_name: postgres-lms
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LMS_POSTGRES_DB:-lms_db}
      POSTGRES_USER: ${LMS_POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${LMS_POSTGRES_PASSWORD:-lms_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      POSTGRES_MAX_CONNECTIONS: 100
    ports:
      - "${LMS_POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_lms_data:/var/lib/postgresql/data
      - ./lms-service/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=database"
      - "service.name=postgres-lms"

  # Cache: Redis (LMS Service)
  redis-lms:
    image: redis:7-alpine
    container_name: redis-lms
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec

    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_lms_data:/data
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    
    security_opt:
      - no-new-privileges:true
    
    labels:
      - "service.type=cache"
      - "service.name=redis-lms"

  # LMS Backend Service: Go
  lms-backend:
    build:
      context: ./lms-service
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-unknown}
        - VERSION=${VERSION:-1.0.0}
    image: ${DOCKER_USERNAME}/bdc-lms:${IMAGE_TAG:-latest}
    container_name: lms-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: ${LMS_PORT:-8081}
      APP_NAME: "LMS Service"
      GIN_MODE: release

      LMS_SYNC_SECRET: ${LMS_SYNC_SECRET}

      DB_HOST: postgres-lms
      DB_PORT: 5432
      DB_USER: ${LMS_POSTGRES_USER}
      DB_PASSWORD: ${LMS_POSTGRES_PASSWORD}
      DB_NAME: ${LMS_POSTGRES_DB}
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: 50
      DB_MAX_IDLE_CONNS: 10
      DB_CONN_MAX_LIFETIME: 5m
      DB_CONN_MAX_IDLE_TIME: 10m

      REDIS_HOST: redis-lms
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      REDIS_POOL_SIZE: 10

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: 1

      STORAGE_TYPE: ${STORAGE_TYPE}
      UPLOAD_MAX_SIZE: 104857600
      UPLOAD_DIR: /app/uploads
      ALLOWED_VIDEO_FORMATS: "mp4,avi,mov,mkv,webm,flv"
      ALLOWED_DOCUMENT_FORMATS: "pdf,doc,docx,ppt,pptx,xls,xlsx,txt"
      ALLOWED_IMAGE_FORMATS: "jpg,jpeg,png,gif,webp,svg"

      AUTH_SERVICE_URL: http://backend:8080
      AUTH_SERVICE_TIMEOUT: 10s

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
      CORS_ALLOWED_HEADERS: "Authorization,Content-Type,Accept"

      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}

      GOMAXPROCS: 2
      GOGC: 100

    ports:
      - "${LMS_PORT:-8081}:8081"
    volumes:
      - lms_upload_data:/app/uploads
      - ./lms-service/logs:/app/logs

    depends_on:
      postgres-lms:
        condition: service_healthy
      redis-lms:
        condition: service_healthy
      backend:
        condition: service_healthy

    networks:
      - app-network

    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      start_period: 45s

    logging: *common-logging

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    security_opt:
      - no-new-privileges:true

    labels:
      - "service.type=backend"
      - "service.name=lms-service"
      - "traefik.enable=true"
      - "traefik.http.routers.lms.rule=Host(`bdc.hpcc.vn`) && PathPrefix(`/lmsapiv1`)"
      - "traefik.http.services.lms.loadbalancer.server.port=8081"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/bdc-ai:${IMAGE_TAG:-latest}
    container_name: ai-service
    restart: unless-stopped
 
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 8000
      LOG_LEVEL: INFO
 
      # Database (shared with lms-service)
      DB_HOST: postgres-lms
      DB_PORT: 5432
      DB_USER: ${LMS_POSTGRES_USER}
      DB_PASSWORD: ${LMS_POSTGRES_PASSWORD}
      DB_NAME: ${LMS_POSTGRES_DB}
 
      # Redis (shared)
      REDIS_HOST: redis-lms
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 1
 
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: lms-files
      MINIO_USE_SSL: "false"
 
      GROQ_API_KEY: ${GROQ_API_KEY:-None}
      CHAT_MODEL: ${AI_CHAT_MODEL:-llama-3.1-8b-instant}
      QUIZ_MODEL: ${AI_QUIZ_MODEL:-llama-3.3-70b-versatile}

      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5-Q}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}

      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET:-ai-service-secret-change-me}

      CHUNK_SIZE: 500
      CHUNK_OVERLAP: 50
      TOP_K_CHUNKS: 3

    ports:
      - "8000:8000"

    depends_on:
      postgres-lms:
        condition: service_healthy
      redis-lms:
        condition: service_healthy
      minio:
        condition: service_healthy

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    labels:
      - "service.type=ai"
      - "service.name=ai-service"

    volumes:
      - ai_model_cache:/app/.cache/fastembed

  ai-worker:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/bdc-ai:${IMAGE_TAG:-latest}
    container_name: ai-worker
    restart: unless-stopped
 
    # Override CMD to run Celery worker
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1 --pool=threads
 
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: postgres-lms
      DB_PORT: 5432
      DB_USER: ${LMS_POSTGRES_USER}
      DB_PASSWORD: ${LMS_POSTGRES_PASSWORD}
      DB_NAME: ${LMS_POSTGRES_DB}
      REDIS_HOST: redis-lms
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: lms-files

      GROQ_API_KEY: ${GROQ_API_KEY:-None}
      CHAT_MODEL: ${AI_CHAT_MODEL:-llama-3.1-8b-instant}
      QUIZ_MODEL: ${AI_QUIZ_MODEL:-llama-3.3-70b-versatile}

      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5-Q}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
      CHUNK_SIZE: 500
      CHUNK_OVERLAP: 50

    depends_on:
      postgres-lms:
        condition: service_healthy
      redis-lms:
        condition: service_healthy
 
    networks:
      - app-network
 
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 256M
 
    labels:
      - "service.type=worker"
      - "service.name=ai-worker"

    volumes:
      - ai_model_cache:/app/.cache/fastembed

  # MinIO: Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio-lms
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BROWSER: "on"
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    security_opt:
      - no-new-privileges:true
    
    labels:
      - "service.type=storage"
      - "service.name=minio"

# Volumes
volumes:
  postgres_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  postgres_lms_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  redis_lms_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=weekly"
  upload_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=weekly"
  lms_upload_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=weekly"
  minio_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  ai_model_cache:
    driver: local

# Networks
networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
    driver_opts:
      com.docker.network.bridge.name: br-bdc
      com.docker.network.driver.mtu: 1500
    labels:
      - "network.name=app-network"
      - "network.environment=production"